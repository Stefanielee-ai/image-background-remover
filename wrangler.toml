name = "image-background-remover-worker"
main = "worker/index.js"
compatibility_date = "2024-01-01"

[vars]
# REMOVE_BG_API_KEY is set via: wrangler secret put REMOVE_BG_API_KEY

[[routes]]
pattern = "/api/remove-bg"
zone_name = "your-domain.com"  # update with your domain, or remove for workers.dev
